# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

type: charm
platforms:
  # amd64-only build matrix. Cross-builds for arm64/ppc64el/s390x are
  # intentionally out of scope: charmcraft's uv plugin currently installs
  # host-arch wheels regardless of the declared `build-for`, producing a
  # silently corrupt artifact for any charm with native deps. Re-add the
  # other architectures once cross-build (or a per-arch native runner)
  # is set up.
  ubuntu-24.04-amd64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:amd64]
  ubuntu-26.04-amd64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:amd64]

parts:
  files:
    plugin: dump
    source: .
    stage:
      - files
  charm:
    after:
      - files
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
