name: Push (stable/squid)

on:
  push:
    branches:
      - stable/squid

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python3 -m pip install tox
      - name: Run linters
        run: tox -e pep8

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: python -m pip install tox
      - name: Run tests
        run: tox -e py3

  release-to-charmhub:
    name: Release to CharmHub
    permissions:
      contents: write
    needs:
      - lint
      - unit-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup LXD
        uses: canonical/setup-lxd@v0.1.1
        with:
          channel: 5.21/stable

      - name: Install charmcraft
        run: |
          # multi-base charmcraft.yaml requires charmcraft >= 4.1, which
          # latest/candidate carries (4.2.x at the time of writing).
          sudo snap install charmcraft --classic --channel=latest/candidate

      - name: Pack charm (multi-base)
        id: pack
        shell: bash
        run: |
          charmcraft pack -v
          # Comma-separated list of all per-base/per-arch artifacts produced
          # by the multi-base charmcraft.yaml. The upload-charm step below
          # consumes the same set.
          # nullglob so an unmatched glob expands to nothing (not the
          # literal "microceph_*.charm"), letting the empty-array check
          # below actually fire when no artifacts were produced.
          shopt -s nullglob
          charms=( microceph_*.charm )
          if (( ${#charms[@]} == 0 )); then
            echo "No microceph_*.charm artifacts produced by charmcraft pack" >&2
            exit 1
          fi
          artifacts=$(IFS=,; echo "${charms[*]}")
          echo "artifacts=${artifacts}" >> "${GITHUB_OUTPUT}"
          ls -al "${charms[@]}"

      # `tag-prefix: squid` namespaces the GitHub tags created by
      # charming-actions so squid revisions are distinguishable from
      # tentacle revisions (which main publishes with a different prefix).
      - name: Release to squid/edge
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: "${{ secrets.CHARMHUB_TOKEN }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          channel: squid/edge
          built-charm-path: "${{ steps.pack.outputs.artifacts }}"
          charmcraft-channel: latest/candidate
          tag-prefix: squid
