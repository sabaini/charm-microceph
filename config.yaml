options:
  snap-channel:
    default: "squid/stable"
    type: string
    description: |
      The snap-channel option determines the MicroCeph snap that is
      being installed via charm. Change this option to perform an
      upgrade of MicroCeph. See https://charmhub.io/microceph for
      details on the upgrade process.
  default-pool-size:
    default: 3
    type: int
    description: |
      The default replication factor for pools. Note that changing
      this value only sets the default value; it doesn't change
      the replication factor for existing pools.
  enable-rgw:
    default: ""
    type: string
    description: |
      Supported values for this option are
      "*" - Enable RGW on all storage nodes
      ""  - Disable RGW on all storage nodes
  region:
    default: RegionOne
    description: Name of the OpenStack region
    type: string
  namespace-projects:
    type: boolean
    default: False
    description: |
      Enable project namespacing. If project namespacing is enabled, keystone
      projects will be implicitly added to a matching project in radosgw, in
      addition to updating the catalog URL to allow radosgw to support
      publicly-readable containers and temporary URLS. This namespacing
      also allows multiple projects to create buckets with the same names,
      as the bucket names are namespaced into the project namespaces in the
      RADOS gateway.

      This configuration option will not be enabled on a charm upgrade, and
      cannot be toggled on in an existing installation as it will remove
      tenant access to existing buckets.
  rbd-stats-pools:
    type: string
    default: ""
    description: |
      Enable RBD IO statistics for specified rbd pools.
  enable-perf-metrics:
    type: boolean
    default: false
    description: |
      Include Ceph performance metrics in the prometheus endpoint.
  site-name:
    type: string
    default: ""
    description: |
      The local site name. This should be unique amongst the connected remote microceph clusters.
  wait-to-adopt:
    type: boolean
    default: False
    description: |
      Whether charm microceph should wait for an external ceph cluster to yield admin credentials using which microceph will
      adopt the external cluster rather than bootstrapping a new ceph cluster on microceph bootstrap.
  osd-devices:
    type: string
    default: ""
    description: |
      DSL expression to match block devices for config-driven OSD enrollment.
      The DSL uses functional syntax with predicates and variables.

      Supported predicates: and(), or(), not(), eq(), ne(), gt(), ge(), lt(), le(), in(), re()
      Supported variables: @type, @vendor, @model, @size, @devnode, @host

      Examples:
        eq(@type,'nvme')
        and(eq(@type,'ssd'), ge(@size,100GiB))
        or(eq(@type,'ssd'), eq(@type,'nvme'))

      When set, the charm evaluates this expression against available
      block devices on each unit and enrolls matching devices as OSDs.
      This is additive to action-based and Juju storage-based OSDs.
  wal-devices:
    type: string
    default: ""
    description: |
      DSL expression to match block devices used as WAL carrier devices for
      config-driven enrollment triggered by osd-devices.

      This option is ignored unless osd-devices is also set.
  db-devices:
    type: string
    default: ""
    description: |
      DSL expression to match block devices used as RocksDB carrier devices for
      config-driven enrollment triggered by osd-devices.

      This option is ignored unless osd-devices is also set.
  wal-size:
    type: string
    default: ""
    description: |
      Requested WAL partition size for devices selected by wal-devices.

      This option is ignored unless osd-devices is also set.
  db-size:
    type: string
    default: ""
    description: |
      Requested RocksDB partition size for devices selected by db-devices.

      This option is ignored unless osd-devices is also set.
  device-add-flags:
    type: string
    default: ""
    description: |
      Comma-separated list of flags controlling config-driven device addition
      with the osd-devices flow.

      Supported flags:
        wipe:osd     - Wipe non-pristine OSD devices before enrollment
        encrypt:osd  - Encrypt OSD devices
        wipe:wal     - Wipe WAL carrier devices before use
        encrypt:wal  - Encrypt WAL partitions/devices
        wipe:db      - Wipe DB carrier devices before use
        encrypt:db   - Encrypt DB partitions/devices

      Example: wipe:osd,encrypt:osd,wipe:wal,encrypt:db

      Note: WAL/DB config and these flags only apply to config-driven
      provisioning initiated by osd-devices. They are not in effect when using
      the add-osd action; use action parameters for that path.
