# This file configures Charmcraft.
# See https://juju.is/docs/sdk/charmcraft-config for guidance.

type: charm
base: ubuntu@24.04
platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [arm64]
    build-for: [arm64]
  ppc64el:
    build-on: [ppc64el]
    build-for: [ppc64el]
  s390x:
    build-on: [s390x]
    build-for: [s390x]

parts:
  files:
    plugin: dump
    source: .
    stage:
      - files
  charm:
    after:
      - files
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    build-packages:
      - git
